<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>舟友同好集会地图</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo" aria-hidden="true">◆</span>
      <h1 class="brand-title">舟友同好集会地图</h1>
      <span class="brand-sub">ARKNIGHTS ONLY · 同好集会分布</span>
    </div>
    <div class="top-actions">
      <button id="btn-submit" class="ak-btn ak-btn--primary">＋ 提交漫展</button>
      <div id="auth-area" class="auth-area"></div>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar" aria-label="漫展列表与筛选">
      <div class="sidebar-head">
        <h2 class="visually-hidden">筛选与搜索</h2>
        <div class="search-box">
          <label class="visually-hidden" for="search">搜索漫展</label>
          <input id="search" type="search" placeholder="搜索名称 / 城市 / 主办…" />
        </div>
        <nav class="filters-status" id="status-tabs" aria-label="按状态筛选">
          <button class="tab active" data-status="">全部</button>
          <button class="tab" data-status="upcoming">即将举办</button>
          <button class="tab" data-status="ongoing">进行中</button>
          <button class="tab" data-status="past">已结束</button>
        </nav>
        <div class="filters-city">
          <label class="visually-hidden" for="city-select">选择城市</label>
          <select id="city-select"><option value="">全部城市</option></select>
          <span id="count" class="count">0 个活动</span>
        </div>
      </div>
      <section class="sidebar-list" aria-label="漫展列表">
        <h2 class="visually-hidden">漫展列表</h2>
        <div id="event-list" class="event-list"></div>
        <p id="list-empty" class="list-empty hidden">暂无符合条件的漫展，换个筛选或去提交一个吧。</p>
      </section>
      <button id="close-list" class="mobile-only close-list" type="button" aria-label="收起列表">✕</button>
    </aside>

    <section class="map-wrap" aria-label="漫展分布地图">
      <h2 class="visually-hidden">漫展分布地图</h2>
      <div id="map" role="application" aria-label="漫展分布地图"></div>
      <div id="map-loading" class="map-loading hidden">
        <div class="ml-spinner"></div>
        <div class="ml-text" id="map-loading-text">正在定位活动坐标…</div>
      </div>
      <button id="toggle-list" class="ak-btn ak-btn--ghost mobile-only" type="button" aria-label="展开列表">☰ 列表</button>
      <div id="map-legend" class="map-legend">
        <span><i class="dot dot--upcoming"></i>即将举办</span>
        <span><i class="dot dot--ongoing"></i>进行中</span>
        <span><i class="dot dot--past"></i>已结束</span>
        <button id="btn-geocode" class="ak-btn ak-btn--sm hidden" style="margin-left:6px;">📍 补全坐标</button>
      </div>
    </section>
  </main>

  <section id="detail-panel" class="detail-panel hidden" aria-label="漫展详情" tabindex="-1"></section>

  <div id="modal-root"></div>
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <script src="/js/app.js"></script>
</body>
</html>
